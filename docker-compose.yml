version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: snowflake_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: petshop
    ports:
      - "5432:5432"
    volumes:
      - ./исходные данные:/data:ro
      - ./init:/docker-entrypoint-initdb.d:ro
      - ./ddl.sql:/ddl.sql:ro
      - ./dml.sql:/dml.sql:ro
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petshop"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
